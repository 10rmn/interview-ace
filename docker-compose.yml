version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ai-interview-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-interview-network

  backend:
    build: ./server
    container_name: ai-interview-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://root:password@mongodb:27017/ai-interview-simulator?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_change_in_production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: http://localhost:5173
      PORT: 5000
    depends_on:
      - mongodb
    networks:
      - ai-interview-network
    restart: unless-stopped

  frontend:
    build: ./client
    container_name: ai-interview-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - ai-interview-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  ai-interview-network:
    driver: bridge
